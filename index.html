<!DOCTYPE html>
<html>
  <head>
    <title>Doodle Jump Experiment</title>
    <!-- Load jsPsych v7 framework and standard CSS -->
    <script src="https://unpkg.com/jspsych@7.3.3"></script>
    <link href="https://unpkg.com/jspsych@7.3.3/css/jspsych.css" rel="stylesheet" type="text/css" />
    <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1"></script>
    <script src="https://unpkg.com/@jspsych/plugin-fullscreen@1.1"></script>
  </head>
  <body>
    <script>
      // FAILSAFE: Check if the scripts successfully loaded from the internet
      if (typeof initJsPsych === 'undefined' || typeof jsPsychHtmlButtonResponse === 'undefined' || typeof jsPsychFullscreen === 'undefined') {
        document.body.innerHTML = '<h2 style="color:red; text-align:center; margin-top:50px;">Error: jsPsych failed to load. Check your internet connection or browser console (F12) for blocked scripts.</h2>';
      } else {
        
        // 1. Initialize jsPsych
        const jsPsych = initJsPsych({
          on_finish: function() {
            // Display the raw JSON data automatically when the experiment is done
            jsPsych.data.displayData();
          }
        });

        const timeline = [];

        // 2. Fullscreen Trial (Browsers require a user click to enter fullscreen)
        const enter_fullscreen = {
          type: jsPsychFullscreen,
          fullscreen_mode: true,
          message: '<p>This experiment will switch to full screen mode when you press the button below.</p>',
          button_label: 'Continue to Full Screen'
        };
        timeline.push(enter_fullscreen);

        // 3. Welcome and Instructions Trial
        const instructions = {
          type: jsPsychHtmlButtonResponse,
          stimulus: `
            <div style="max-width: 600px; margin: auto; padding-bottom: 20px;">
              <h2>Doodle Jump Experiment</h2>
              <p>In the next screen, you will play a clone of the game <strong>Doodle Jump</strong>.</p>
              <ul style="text-align: left;">
                <li><strong>Controls:</strong> Use the <strong>Left</strong> and <strong>Right</strong> arrow keys (or A and D) to move.</li>
                <li>Your total screen time will be tracked. Even if your character falls and the game restarts, your continuous play time is being recorded.</li>
                <li>Play for as long as you feel like!</li>
              </ul>
              <p>When you are completely finished playing, click the <strong>"Finish Experiment"</strong> button located below the game.</p>
            </div>
          `,
          choices: ['Start Game']
        };
        timeline.push(instructions);

        // 4. The Game Trial
        const game_trial = {
          type: jsPsychHtmlButtonResponse,
          stimulus: `
            <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 20px;">
              <p style="margin: 0 0 10px 0; color: #555;">
                <em>Note: Click inside the game area first if your keyboard controls do not respond.</em>
              </p>
              
              <!-- If the live GitHub Pages link returns a 404 or a blank box, change the src below to your downloaded local path (e.g., "./doodle-jump-main/index.html") -->
              <iframe 
                src="https://takosenpai2687.github.io/doodle-jump/" 
                id="doodle-iframe"
                title="Doodle Jump Game"
                style="width: 400px; height: 600px; border: 2px solid #ccc; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
              </iframe>
            </div>
          `,
          choices: ['Finish Experiment'],
          data: {
            task: 'doodle_jump_play'
          },
          on_load: function() {
            // Attempt to auto-focus the iframe so keyboard events work immediately 
            const iframe = document.getElementById('doodle-iframe');
            if (iframe) iframe.focus();
          }
        };
        timeline.push(game_trial);

        // 5. Debrief Trial (Showing the tracked time)
        const debrief = {
          type: jsPsychHtmlButtonResponse,
          stimulus: function() {
            const game_data = jsPsych.data.get().filter({task: 'doodle_jump_play'}).values()[0];
            
            // Convert RT (milliseconds) to seconds
            const time_seconds = Math.round(game_data.rt / 1000);
            const time_minutes = (time_seconds / 60).toFixed(2);
            
            return `
              <div style="max-width: 600px; margin: auto; padding-bottom: 20px;">
                <h2>Experiment Complete</h2>
                <p>Thank you for participating!</p>
              </div>
            `;
          },
          choices: ['View Raw Data']
        };
        timeline.push(debrief);

        //data collection (DO NOT TOUCH!!!)
        const subject_id = jsPsych.randomization.randomID(10);
        const filename = `${subject_id}.csv`;
        const save_data = {
          type: jsPsychPipe,
          action: "save",
          experiment_id: "EHb4oBeNaMQJ",
          filename: filename,
          data_string: ()=>jsPsych.data.get().csv()
        };
        timeline.push(save_data);

        // (Optional) Exit fullscreen mode at the end
        const exit_fullscreen = {
          type: jsPsychFullscreen,
          fullscreen_mode: false,
          delay_after: 0
        };
        timeline.push(exit_fullscreen);

        // 6. Run the experiment
        jsPsych.run(timeline);
      }
    </script>
  </body>
</html>
