<!DOCTYPE html>
<html>
  <head>
    <title>Doodle Jump Experiment</title>

    <!-- jsPsych core -->
    <script src="https://unpkg.com/jspsych@7.3.3"></script>
    <link href="https://unpkg.com/jspsych@7.3.3/css/jspsych.css" rel="stylesheet" />

    <!-- Plugins -->
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.0.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-fullscreen@1.1"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.0.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-likert@1.0.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-multi-choice@1.0.0"></script>
    <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe"></script>
  </head>

  <body>
    <script>
      // FAILSAFE: Ensure jsPsych loaded
      if (typeof initJsPsych === 'undefined') {
        document.body.innerHTML =
          '<h2 style="color:red; text-align:center; margin-top:50px;">Error: jsPsych failed to load.</h2>';
      } else {

        /* ---------------------------------------------------------
           Initialize jsPsych
        --------------------------------------------------------- */
        const jsPsych = initJsPsych({
          on_finish: function() {
            jsPsych.data.displayData();   // MUTE THIS LINE IF WE WANT TO HIDE RAW DATA FROM PARTICIPANTS
          }
        });

        const timeline = [];

        /* ---------------------------------------------------------
           Generate subject_id and condition
        --------------------------------------------------------- */
        const subject_id = jsPsych.randomization.randomID(10);
        // each participant has 50% chance in either extrinsic or intrinsic condition, NOT globally counterbalanced
        const condition = jsPsych.randomization.sampleWithoutReplacement(
          ["intrinsic", "extrinsic"], 1
        )[0];

        console.log(condition)

        jsPsych.data.addProperties({
          subject_id: subject_id,
          condition: condition
        });

        const game_url = condition === "intrinsic"
          ? "intrinsic.html"
          : "extrinsic.html";

        // Welcome to experiment
        var welcome = {
          type: jsPsychHtmlKeyboardResponse,
          stimulus: `
          <h1>Welcome to the Doodle Jump study!</h1>
          <p>Press any key to begin</p>
          `,
        };
        timeline.push(welcome);

        // 

        /* ---------------------------------------------------------
           Fullscreen
        --------------------------------------------------------- */
        const enter_fullscreen = {
          type: jsPsychFullscreen,
          fullscreen_mode: true,
          message: '<p>This experiment will switch to full screen mode.</p>',
          button_label: 'Continue'
        };
        timeline.push(enter_fullscreen);

        /* ---------------------------------------------------------
           Instructions
        --------------------------------------------------------- */
        const instructions = {
          type: jsPsychHtmlButtonResponse,
          stimulus: `
            <div style="max-width: 600px; margin: auto;">
              <h1>Instructions</h1>
              <p>In this study, you will play a Doodle Jump game.</p>
              <p>Use the Left and Right Arrow keys (or A and D) to move.</p>
              <p>You may play for <strong>as long as you wish</strong>. If the game ends, you may restart and continue playing.</p>
              <p>Please complete this task in a quiet environment with minimal distractions. If possible, we recommend wearing headphones or earphones, as the game includes audio.</p>
              <p>When you are completely finished playing, click the “<strong>Exit</strong>” button in the top-right corner of the screen.</p>
              <p style="color: #555;"><i>Note: If the keyboard controls do not respond, please click inside the game area ONCE to activate it.</i></p>
              <p> </p>
            </div>
          `,
          choices: ['Begin']
        };
        timeline.push(instructions);

        /* ---------------------------------------------------------
            Condition‑specific Email Trial
        --------------------------------------------------------- */
        let email_entry;

        if (condition === "intrinsic") {
          email_entry = {
            type: jsPsychSurveyText,
            questions: [
              {
                prompt: `
                  <p>One participant will be randomly selected to receive a reward.</p>
                  <p>Selection is completely random.</p>
                  <p>***Your score and game performance will <strong>NOT</strong> affect your chances of receiving the reward***</p>
                  <br>
                  <p>Please enter the <strong>SAME</strong> email address you provided in the pre-screening survey so we can contact you regarding rewards:</p>
                `,
                name: "email",
                required: true
              }
            ],
            data: { task: "email_entry", reward_type: "intrinsic" },
            on_finish: function(data){
              const email = data.response.email;
              jsPsych.data.addProperties({ email: email });
            }
          };
        }

        if (condition === "extrinsic") {
          email_entry = {
            type: jsPsychSurveyText,
            questions: [
              {
                prompt: `
                  <p>The participant who achieves the <strong>highest score</strong> will receive a reward.</p>
                  <p>The better your performance, the higher your chances of winning!</p>
                  <br>
                  <p>Please enter the <strong>same</strong> email address you provided in the pre-screening survey so we can contact you regarding rewards:</p>
                `,
                name: "email",
                required: true
              }
            ],
            data: { task: "email_entry", reward_type: "extrinsic" },
            on_finish: function(data){
              const email = data.response.email;
              jsPsych.data.addProperties({ email: email });
            }
          };
        }
        timeline.push(email_entry);


        /* ---------------------------------------------------------
           Game Trial (iframe)
        --------------------------------------------------------- */
        const game_trial = {
          type: jsPsychHtmlButtonResponse,
          stimulus: `
            <style>
              #jspsych-html-button-response-btngroup {
                position: fixed;
                top: 20px;
                right: 20px;
                width: auto;
                z-index: 1000;
              }
            </style>

            <div id="game-container" style="display:flex; flex-direction:column; align-items:center; margin-bottom: 20px; position: relative;">
              <p style="margin: 10px 0 10px 0; color:#555;">
                <em>Note: Click inside the game area first if your keyboard controls do not respond.</em>
              </p>

              <iframe 
                src="${game_url}"
                id="game-iframe"
                title="Game"
                style="width: 400px; height: 600px; border: 2px solid #ccc; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
              </iframe>
            </div>
          `,
          choices: ['Exit'],
          data: { task: "game_play" },
          on_load: function() {

          // Focus iframe for keyboard controls
          const iframe = document.getElementById("game-iframe");
          if (iframe) iframe.focus();

          // Only show motivational popups in extrinsic condition
          if (condition === "extrinsic") {
            const messages = [
              "Keep going! You're competing for the top score!🔥🔥🔥",
              "Every point increases your chance of winning 🥇🥇",
              "💪💪💪💪 Push harder!!! highest score wins!",
              "💥 Every jump counts! Don't stop now!",
              "Go for it! Beat your personal best 🚀🚀",
              "Almost there! Show everyone who's best 🏆",
              "🏁 Race to the highest score! 🏁 ",
              "Lock IN! Every move matters in this challenge!!! 🌟",
              "💣 Don't let anyone else take your crown! 👑",

            ];

            // Start interval
            window.motivationInterval = setInterval(() => {

              const msg = messages[Math.floor(Math.random() * messages.length)];

              const popup = document.createElement("div");
              popup.innerText = msg;
              popup.style.position = "absolute";
              popup.style.top = "0";
              popup.style.left = "50%";
              popup.style.transform = "translateX(-50%)";
              popup.style.background = "rgba(0,0,0,0.85)";
              popup.style.color = "white";
              popup.style.padding = "10px 20px";
              popup.style.borderRadius = "8px";
              popup.style.fontSize = "16px";
              popup.style.textAlign = "center";
              popup.style.opacity = "1";
              popup.style.transition = "opacity 0.5s";
              popup.style.zIndex = "9999";

              iframe.parentNode.appendChild(popup);

              setTimeout(() => {
                popup.style.opacity = "0";          // fade out smoothly
                setTimeout(() => popup.remove(), 500);  // appear, stays visible for 2 sec, fades out over 0.5 sec, disappear
              }, 2000);
            }, 15000);
          }
          },
      
        on_finish: function() {
          // Stop popups when the trial ends
          if (window.motivationInterval) {
            clearInterval(window.motivationInterval);
          }
        }
      };
        timeline.push(game_trial);

        /* ---------------------------------------------------------
           Post-experimental Survey (WIP...)
        --------------------------------------------------------- */
        // start page for post survey
        const start_last_survey = {
          type: jsPsychHtmlKeyboardResponse,
          stimulus: `
            <div style="max-width:600px; margin:auto;">
              <h1>Post-experimental Survey</h1>
              <p>Please help us answer a few questions before leaving.</p>
              <p><i>Press any key to continue.</i></p>
            </div>
          `
        };
        timeline.push(start_last_survey);
        
        //


        var last_survey = {
          type: jsPsychSurveyText,
          preamble: "<h2></h2><p></p>",
          questions: [
            {prompt: "2. What do you think we are trying to measure?", placeholder: "Type your answer here...", rows: 3, columns:70, required: true},
            {prompt: "4. Was there any technical issue you ran into?", placeholder: "If yes, please put it down here... ", rows: 3, columns:70, required: true},
          ],

          data: {
            // store questions in post-experimental survey that WE CARE IN DATA ANALYSIS
          },
        };
        timeline.push(last_survey);

        /* ---------------------------------------------------------
           Debrief
        --------------------------------------------------------- */
        const debrief = {
          type: jsPsychHtmlKeyboardResponse,
          stimulus: `
            <div style="max-width:600px; margin:auto;">
              <h1>Thank you for participating!</h1>
              <p><img src="slideout.gif" width="250px"></p>
              <p>This experiment is interested in how extrinsic and intrinsic motivation can more or less modulate a person's consistency and performance on a task.</p>
              <p><i>Press any key to exit the experiment.</i></p>
            </div>
          `
        };
        timeline.push(debrief);

        /* ---------------------------------------------------------
           Save Data (jsPsychPipe)
           DO NOT MODIFY experiment_id
        --------------------------------------------------------- */
        const filename = `${subject_id}.csv`;

        const save_data = {
          type: jsPsychPipe,
          action: "save",
          experiment_id: "EHb4oBeNaMQJ",
          filename: filename,
          data_string: () => jsPsych.data.get().csv()
        };
        timeline.push(save_data);

        /* ---------------------------------------------------------
           Exit Fullscreen
        --------------------------------------------------------- */
        const exit_fullscreen = {
          type: jsPsychFullscreen,
          fullscreen_mode: false
        };
        timeline.push(exit_fullscreen);

        /* ---------------------------------------------------------
           Run Experiment
        --------------------------------------------------------- */
        jsPsych.run(timeline);
      }
    </script>
  </body>
</html>
